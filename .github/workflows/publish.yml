name: Publish to npm

# Publishes to npmjs.com whenever a GitHub Release is published.
# Uses npm Trusted Publishing (OIDC) - no NPM_TOKEN secret required.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing needs a recent npm CLI.
      - run: npm install -g npm@latest

      - run: npm ci --ignore-scripts

      - run: npm run typecheck

      - run: npm run build

      - run: npm publish --provenance --access public
