	<rect x="78" y="148" width="36" height="36" rx="8" fill="#FFFFFF" opacity="0.14"/>
	<rect x="78" y="204" width="36" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
	<rect x="78" y="260" width="36" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
	<rect x="78" y="316" width="36" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
	<rect x="140" y="48" width="1008" height="82" fill="#FFFFFF"/>
	<text x="184" y="96" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Contacts</text>
	<rect x="948" y="72" width="136" height="36" rx="18" fill="#6644FF"/>
	<text x="982" y="96" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Create Item</text>
