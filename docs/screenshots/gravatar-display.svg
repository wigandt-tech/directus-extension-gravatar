<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Gravatar display in a Directus list view</title>
  <desc id="desc">Dark Directus-style table with email rows rendered as circular Gravatar avatars.</desc>
  <defs>
    <linearGradient id="avatar-a" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00a86b"/>
      <stop offset="100%" stop-color="#6644ff"/>
    </linearGradient>
    <linearGradient id="avatar-b" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="avatar-c" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <rect width="780" height="360" rx="10" fill="#18222f"/>
  <text x="28" y="38" fill="#e4ebf1" font-size="15" font-weight="700">Contacts</text>
  <rect x="632" y="18" width="120" height="32" rx="16" fill="#6644ff"/>
  <text x="692" y="39" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Create Item</text>

  <rect x="28" y="70" width="724" height="236" rx="8" fill="#1b2735" stroke="#2f3c4c"/>
  <rect x="28" y="70" width="724" height="44" rx="8" fill="#21303f"/>
  <text x="52" y="98" fill="#8196a9" font-size="12" font-weight="700">NAME</text>
  <text x="248" y="98" fill="#8196a9" font-size="12" font-weight="700">EMAIL</text>
  <text x="582" y="98" fill="#8196a9" font-size="12" font-weight="700">ROLE</text>

  <g font-size="14">
    <text x="52" y="153" fill="#e4ebf1" font-weight="600">Avery Stone</text>
    <circle cx="268" cy="148" r="18" fill="url(#avatar-a)"/>
    <text x="268" y="153" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">AS</text>
    <text x="298" y="153" fill="#c5cfdb">avery@example.com</text>
    <rect x="582" y="130" width="68" height="28" rx="14" fill="#1f4d3a"/>
    <text x="616" y="149" fill="#8ff0b8" font-size="12" font-weight="700" text-anchor="middle">Editor</text>
    <line x1="28" x2="752" y1="178" y2="178" stroke="#2f3c4c"/>

    <text x="52" y="217" fill="#e4ebf1" font-weight="600">Mira Chen</text>
    <circle cx="268" cy="212" r="18" fill="url(#avatar-b)"/>
    <text x="268" y="217" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">MC</text>
    <text x="298" y="217" fill="#c5cfdb">mira@example.com</text>
    <rect x="582" y="194" width="82" height="28" rx="14" fill="#322758"/>
    <text x="623" y="213" fill="#c9bbff" font-size="12" font-weight="700" text-anchor="middle">Manager</text>
    <line x1="28" x2="752" y1="242" y2="242" stroke="#2f3c4c"/>

    <text x="52" y="281" fill="#e4ebf1" font-weight="600">Sam Rivera</text>
    <circle cx="268" cy="276" r="18" fill="#26384a"/>
    <path d="M268 263a6 6 0 1 1 0 12a6 6 0 0 1 0-12Zm-12 27c2-7 7-11 12-11s10 4 12 11" fill="none" stroke="#8196a9" stroke-width="2.5" stroke-linecap="round"/>
    <text x="298" y="281" fill="#c5cfdb">sam@example.com</text>
    <rect x="582" y="258" width="70" height="28" rx="14" fill="#4f3b1e"/>
    <text x="617" y="277" fill="#ffd28a" font-size="12" font-weight="700" text-anchor="middle">Viewer</text>
  </g>

  <rect x="28" y="326" width="290" height="12" rx="6" fill="#21303f"/>
  <rect x="28" y="326" width="132" height="12" rx="6" fill="#3a485a"/>
</svg>
