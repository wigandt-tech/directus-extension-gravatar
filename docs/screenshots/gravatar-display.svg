<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
	<title id="title">Gravatar display in a Directus list view</title>
	<desc id="desc">A Directus collection list showing email rows rendered with circular Gravatar avatars and optional email text.</desc>
	<defs>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#182235" flood-opacity="0.16"/>
		</filter>
		<linearGradient id="avatar-a" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0%" stop-color="#00A86B"/>
			<stop offset="100%" stop-color="#4F46E5"/>
		</linearGradient>
		<linearGradient id="avatar-b" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0%" stop-color="#E879F9"/>
			<stop offset="100%" stop-color="#F59E0B"/>
		</linearGradient>
		<linearGradient id="avatar-c" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0%" stop-color="#14B8A6"/>
			<stop offset="100%" stop-color="#0EA5E9"/>
		</linearGradient>
	</defs>
	<rect width="1200" height="760" fill="#F5F7FA"/>
	<rect x="52" y="48" width="1096" height="664" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
	<rect x="52" y="48" width="88" height="664" rx="10" fill="#18212F"/>
	<rect x="52" y="48" width="88" height="664" rx="10" fill="#18212F"/>
