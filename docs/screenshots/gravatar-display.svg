	<text x="790" y="199" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">ROLE</text>
	<line x1="184" x2="1076" y1="220" y2="220" stroke="#E5EAF0"/>
	<g font-family="Inter, Arial, sans-serif">
