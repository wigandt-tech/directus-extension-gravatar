<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Gravatar display options in Directus</title>
  <desc id="desc">Dark Directus-style configuration panel for the Gravatar display options.</desc>
  <defs>
    <linearGradient id="avatar" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00a86b"/>
      <stop offset="100%" stop-color="#6644ff"/>
    </linearGradient>
  </defs>

  <rect width="780" height="300" rx="10" fill="#18222f"/>
  <text x="28" y="38" fill="#e4ebf1" font-size="15" font-weight="700">Display: Gravatar</text>

  <rect x="28" y="62" width="320" height="198" rx="8" fill="#1b2735" stroke="#2f3c4c"/>
  <text x="52" y="102" fill="#8196a9" font-size="12" font-weight="700">EMAIL</text>
  <circle cx="76" cy="140" r="22" fill="url(#avatar)"/>
  <text x="76" y="147" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">AS</text>
  <text x="112" y="145" fill="#e4ebf1" font-size="14">avery@example.com</text>
  <line x1="52" x2="324" y1="178" y2="178" stroke="#2f3c4c"/>
  <circle cx="76" cy="216" r="22" fill="#26384a"/>
  <path d="M76 201a7 7 0 1 1 0 14a7 7 0 0 1 0-14Zm-14 31c2-8 8-12 14-12s12 4 14 12" fill="none" stroke="#8196a9" stroke-width="2.5" stroke-linecap="round"/>
  <text x="112" y="221" fill="#c5cfdb" font-size="14">missing@example.com</text>

  <rect x="392" y="62" width="360" height="198" rx="8" fill="#21303f" stroke="#2f3c4c"/>
  <text x="416" y="100" fill="#e4ebf1" font-size="14" font-weight="700">Options</text>

  <text x="416" y="134" fill="#8196a9" font-size="12">Size</text>
  <rect x="532" y="116" width="76" height="30" rx="6" fill="#1b2735" stroke="#2f3c4c"/>
  <text x="570" y="136" fill="#c5cfdb" font-size="13" text-anchor="middle">32</text>
  <text x="632" y="134" fill="#8196a9" font-size="12">Shape</text>
  <rect x="682" y="116" width="46" height="30" rx="15" fill="#322758" stroke="#6644ff"/>
  <text x="705" y="136" fill="#c9bbff" font-size="12" font-weight="700" text-anchor="middle">Circle</text>

  <text x="416" y="176" fill="#8196a9" font-size="12">Default image</text>
  <rect x="532" y="158" width="196" height="30" rx="6" fill="#1b2735" stroke="#2f3c4c"/>
  <text x="546" y="178" fill="#c5cfdb" font-size="13">Mystery Person</text>

  <text x="416" y="218" fill="#8196a9" font-size="12">Rating</text>
  <rect x="532" y="200" width="48" height="30" rx="6" fill="#1b2735" stroke="#2f3c4c"/>
  <text x="556" y="220" fill="#c5cfdb" font-size="13" font-weight="700" text-anchor="middle">G</text>
  <rect x="612" y="200" width="116" height="30" rx="15" fill="#1f4d3a"/>
  <circle cx="630" cy="215" r="6" fill="#8ff0b8"/>
  <text x="650" y="220" fill="#8ff0b8" font-size="12" font-weight="700">Show email</text>
</svg>
